services:
  nginx:
    image: nginx:alpine
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/escandallo
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - escandallo_bridge

  backend:
    build:
      context: ./docker/php
      args:
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    working_dir: /var/www/escandallo/backend
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/var/www/escandallo
      - backend_vendor:/var/www/escandallo/backend/vendor
    networks:
      - escandallo_bridge

  frontend:
    image: node:lts-alpine
    working_dir: /var/www/escandallo/frontend
    command: >
      sh -lc "if [ ! -d node_modules/vite ]; then
        echo 'Frontend deps missing. Run bash scripts/wsl/fresh-install.sh';
        sleep infinity;
      fi;
      npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/escandallo
      - frontend_node_modules:/var/www/escandallo/frontend/node_modules
    networks:
      - escandallo_bridge

  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: escandallo
      MYSQL_USER: escandallo_app
      MYSQL_PASSWORD: escandallo_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - escandallo_bridge

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "6379:6379"
    networks:
      - escandallo_bridge

  mailpit:
    image: axllent/mailpit:latest
    profiles: ["mail"]
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - escandallo_bridge

  adminer:
    image: adminer:4
    profiles: ["tools"]
    depends_on:
      - mysql
    ports:
      - "8081:8080"
    networks:
      - escandallo_bridge

volumes:
  mysql_data:
  backend_vendor:
  frontend_node_modules:

networks:
  escandallo_bridge:
    driver: bridge
